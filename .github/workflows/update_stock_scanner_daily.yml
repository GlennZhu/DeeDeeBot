name: Update Stock Scanner Daily

on:
  schedule:
    - cron: "10 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  MARKET_DATA_PROVIDER: "schwab"
  SCHWAB_ACCESS_TOKEN: ${{ secrets.SCHWAB_ACCESS_TOKEN }}
  SCHWAB_REFRESH_TOKEN: ${{ secrets.SCHWAB_REFRESH_TOKEN }}
  SCHWAB_CLIENT_ID: ${{ secrets.SCHWAB_CLIENT_ID }}
  SCHWAB_CLIENT_SECRET: ${{ secrets.SCHWAB_CLIENT_SECRET }}
  SCHWAB_QUOTES_MAX_SYMBOLS_PER_REQUEST: "180"
  STOCK_FAIL_MAX_ERROR_RATIO: "0.95"
  SCANNER_FAIL_MAX_ERROR_RATIO: "0.65"
  SCANNER_FETCH_MAX_ATTEMPTS: "2"
  SCANNER_FETCH_BACKOFF_SECONDS: "0.2"
  SCANNER_CIRCUIT_PREFETCH_MAX_COVERAGE: "0.05"
  SCANNER_CIRCUIT_PROBE_COUNT: "6"
  WATCHLIST_CIRCUIT_PREFETCH_MAX_COVERAGE: "0.05"
  WATCHLIST_CIRCUIT_PROBE_COUNT: "4"

jobs:
  pre-shard-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh watchlist + universe (scanner skipped)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -m src.pipeline --stock-only --skip-scanner
          cp data/derived/scanner_signals_latest.csv data/derived/scanner_signals_previous_full.csv

      - name: Upload pre-shard baseline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pre-shard-base
          if-no-files-found: error
          path: |
            data/derived/stock_signals_latest.csv
            data/derived/stock_watchlist.csv
            data/derived/stock_universe.csv
            data/derived/scanner_thesis_tags.csv
            data/derived/signal_events_7d.csv
            data/derived/scanner_signals_latest.csv
            data/derived/scanner_signals_previous_full.csv

  scanner-shards:
    needs: pre-shard-refresh
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - shard_index: 0
            shard_count: 6
            wait_minutes: 0
          - shard_index: 1
            shard_count: 6
            wait_minutes: 20
          - shard_index: 2
            shard_count: 6
            wait_minutes: 20
          - shard_index: 3
            shard_count: 6
            wait_minutes: 20
          - shard_index: 4
            shard_count: 6
            wait_minutes: 20
          - shard_index: 5
            shard_count: 6
            wait_minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download pre-shard baseline
        uses: actions/download-artifact@v4
        with:
          name: pre-shard-base
          path: artifacts/pre

      - name: Restore baseline derived files
        run: |
          mkdir -p data/derived
          cp -f artifacts/pre/data/derived/* data/derived/

      - name: Wait before shard run
        if: ${{ matrix.wait_minutes > 0 }}
        run: |
          echo "Sleeping ${{ matrix.wait_minutes }} minutes before shard ${{ matrix.shard_index }}..."
          sleep "$(( ${{ matrix.wait_minutes }} * 60 ))"

      - name: Run scanner shard (self-throttled)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SCANNER_PARALLEL_WORKERS: "2"
          SCANNER_DAILY_REQUESTS_PER_SECOND: "0.4"
          SCANNER_INTRADAY_REQUESTS_PER_SECOND: "0.3"
          SCANNER_PROGRESS_LOG_EVERY: "20"
          SCANNER_YF_PREFETCH_BATCH_SIZE_FAST: "30"
          SCANNER_YF_PREFETCH_PAUSE_FAST: "1.5"
          SCANNER_YF_PREFETCH_BATCH_SIZE_SLOW: "15"
          SCANNER_YF_PREFETCH_PAUSE_SLOW: "3.0"
        run: |
          python -m src.pipeline \
            --scanner-only \
            --scanner-all-tickers \
            --scanner-shard-index "${{ matrix.shard_index }}" \
            --scanner-shard-count "${{ matrix.shard_count }}" \
            --scanner-workers "${SCANNER_PARALLEL_WORKERS}" \
            --scanner-daily-rps "${SCANNER_DAILY_REQUESTS_PER_SECOND}" \
            --scanner-intraday-rps "${SCANNER_INTRADAY_REQUESTS_PER_SECOND}" \
            --scanner-progress-log-every "${SCANNER_PROGRESS_LOG_EVERY}"

      - name: Save shard scanner output
        run: |
          mkdir -p artifacts/shard
          cp data/derived/scanner_signals_latest.csv "artifacts/shard/scanner_signals_shard_${{ matrix.shard_index }}_of_${{ matrix.shard_count }}.csv"

      - name: Upload shard artifact
        uses: actions/upload-artifact@v4
        with:
          name: scanner-shard-${{ matrix.shard_index }}
          if-no-files-found: error
          path: artifacts/shard/scanner_signals_shard_${{ matrix.shard_index }}_of_${{ matrix.shard_count }}.csv

  merge-and-commit:
    needs:
      - pre-shard-refresh
      - scanner-shards
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download pre-shard baseline
        uses: actions/download-artifact@v4
        with:
          name: pre-shard-base
          path: artifacts/pre

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scanner-shard-*
          merge-multiple: false
          path: artifacts/shards

      - name: Restore baseline files before merge
        run: |
          mkdir -p data/derived
          cp -f artifacts/pre/data/derived/* data/derived/

      - name: Merge scanner shards + update scanner events
        run: |
          python scripts/merge_scanner_shards.py \
            --previous-scanner data/derived/scanner_signals_previous_full.csv \
            --output-scanner data/derived/scanner_signals_latest.csv \
            --signal-events data/derived/signal_events_7d.csv \
            --shard-glob "artifacts/shards/**/scanner_signals_shard_*.csv" \
            --min-shards 6
          rm -f data/derived/scanner_signals_previous_full.csv

      - name: Commit changed scanner CSV files
        run: |
          if [[ -n "$(git status --porcelain data/derived/stock_signals_latest.csv data/derived/stock_watchlist.csv data/derived/stock_universe.csv data/derived/scanner_signals_latest.csv data/derived/scanner_thesis_tags.csv data/derived/signal_events_7d.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/derived/stock_signals_latest.csv data/derived/stock_watchlist.csv data/derived/stock_universe.csv data/derived/scanner_signals_latest.csv data/derived/scanner_thesis_tags.csv data/derived/signal_events_7d.csv
            git commit -m "chore(data): refresh sharded stock scanner cache"
            git push
          else
            echo "No scanner cache changes detected."
          fi
