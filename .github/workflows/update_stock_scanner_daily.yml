name: Update Stock Scanner Daily

on:
  schedule:
    - cron: "10 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stock-scanner-daily:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily S&P500 + Nasdaq500 EOD 3-signal scanner
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SCANNER_PARALLEL_WORKERS: "8"
          SCANNER_DAILY_REQUESTS_PER_SECOND: "4.0"
          SCANNER_PROGRESS_LOG_EVERY: "25"
        run: python -m src.pipeline --stock-only --scanner-all-tickers

      - name: Commit changed scanner CSV files
        run: |
          if [[ -n "$(git status --porcelain data/derived/stock_signals_latest.csv data/derived/stock_watchlist.csv data/derived/stock_universe.csv data/derived/scanner_signals_latest.csv data/derived/scanner_thesis_tags.csv data/derived/signal_events_7d.csv)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/derived/stock_signals_latest.csv data/derived/stock_watchlist.csv data/derived/stock_universe.csv data/derived/scanner_signals_latest.csv data/derived/scanner_thesis_tags.csv data/derived/signal_events_7d.csv
            git commit -m "chore(data): refresh full-universe stock scanner cache"
            git push
          else
            echo "No scanner cache changes detected."
          fi
